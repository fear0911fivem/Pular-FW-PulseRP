<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/radio.css">
    <title>OB Radio 2</title>
</head>
<body>
    <!-- Radio Wheel -->
    <div id="radio-wheel" class="hidden">
        <div id="wheel-container">
            <div id="stations-ring"></div>
            <div id="wheel-center">
                <div id="center-label">Radio</div>
                <div id="now-playing" class="hidden">
                    <div id="np-title"></div>
                    <div id="np-artist"></div>
                </div>
                <div id="volume-control">
                    <div id="volume-label">VOL</div>
                    <input type="range" id="volume-slider" min="0" max="100" value="70">
                    <div id="volume-value">70%</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Now Playing Bar (only when in vehicle, wheel closed) -->
    <div id="now-playing-bar" class="hidden">
        <div id="npb-top">
            <img id="npb-logo" alt="">
            <div id="npb-info">
                <div id="npb-title"><span class="scroll-inner"></span></div>
                <div id="npb-artist"><span class="scroll-inner"></span></div>
            </div>
        </div>
        <div id="npb-progress-wrapper">
            <div id="npb-progress">
                <div id="npb-progress-fill"></div>
                <div id="npb-progress-dot"></div>
            </div>
            <div id="npb-times">
                <span id="npb-time-current">0:00</span>
                <span id="npb-time-total">0:00</span>
            </div>
        </div>
    </div>

    <script src="js/audio.js"></script>
    <script src="js/radio.js"></script>
    <script src="js/nui.js"></script>
</body>
</html>
